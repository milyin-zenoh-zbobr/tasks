# zbobr configuration
# See documentation for all available options.

[dispatcher]
instance = "default"
workspaces = "./workspaces"
base_port = 3000
provider_exclusion_secs = 3600
provider_exclusion_fail_count = 3
work_branch_prefix = "zbobr_fix"
git_user_name = "zbobr"
git_user_email = "zbobr@example.com"
overwrite_author = false

[dispatcher.agent_github_token]
value = "not-configured"

[dispatcher.providers]
claude = { executor = "claude" }
copilot = { executor = "copilot" }
claude_planner = { parent = "claude", plan_mode = true }
copilot_planner = { parent = "copilot", plan_mode = true }

[dispatcher.tools]
developer = [{ provider = "claude", model = "claude-opus-4-6" }, { provider = "copilot", model = "claude-sonnet-4.6", priority = 0 }]
planner = [{ provider = "claude_planner", model = "claude-opus-4-6" }, { provider = "copilot_planner", model = "claude-sonnet-4.6", priority = 0 }]
helper = [{ provider = "copilot", model = "claude-haiku-4.5" }, { provider = "claude", model = "claude-haiku-4-5", priority = 0 }]
reviewer = [{ provider = "copilot", model = "gpt-5.4" }, { provider = "claude", model = "claude-sonnet-4-6", priority = 0 }]
drudge = [{ provider = "copilot", model = "gpt-5-mini" }, { provider = "claude", model = "claude-haiku-4-5", priority = 0 }]

[tasks]
default_max_stage_count = 20
github_repo = "owner/repo"

[tasks.github_token]
value = ""

[repo]
repository = "owner/repo"
branch = "main"
repos_dir = "./repos"

[repo.github_token]
value = ""

[executor.copilot]

[workflow]
prompts_dir = "prompts"

[workflow.roles.planner]
mcp = [
    "stop_with_error",
    "stop_with_question",
    "report_success",
    "report_intermediate",
    "add_checklist_item",
    "get_ctx_rec",
]
prompt = "planner.md"
tool = "planner"

[workflow.roles.worker]
mcp = [
    "stop_with_error",
    "report_success",
    "report_failure",
    "report_intermediate",
    "stop_with_question",
    "add_checklist_item",
    "check_checklist_item",
    "get_ctx_rec",
]
prompt = "worker.md"
tool = "developer"

[workflow.roles.test_planner]
mcp = [
    "stop_with_error",
    "stop_with_question",
    "report_success",
    "report_intermediate",
    "add_checklist_item",
    "get_ctx_rec",
]
prompt = "test_planner.md"
tool = "planner"

[workflow.roles.test_worker]
mcp = [
    "stop_with_error",
    "report_success",
    "report_failure",
    "report_intermediate",
    "stop_with_question",
    "add_checklist_item",
    "check_checklist_item",
    "get_ctx_rec",
]
prompt = "test_worker.md"
tool = "helper"

[workflow.roles.reviewer]
mcp = [
    "stop_with_error",
    "report_success",
    "report_failure",
    "report_intermediate",
    "stop_with_question",
    "check_checklist_item",
    "get_ctx_rec",
]
prompt = "reviewer.md"
tool = "reviewer"

[workflow.roles.tester]
mcp = [
    "stop_with_error",
    "report_success",
    "report_failure",
    "stop_with_question",
    "get_ctx_rec",
]
prompt = "tester.md"
tool = "helper"

[workflow.roles.linter]
mcp = [
    "stop_with_error",
    "report_success",
    "report_failure",
    "stop_with_question",
    "get_ctx_rec",
]
prompt = "linter.md"
tool = "drudge"

[workflow.roles.linter_worker]
mcp = [
    "stop_with_error",
    "report_success",
    "report_failure",
    "stop_with_question",
    "get_ctx_rec",
]
prompt = "linter_worker.md"
tool = "developer"

[workflow.roles.merger]
mcp = [
    "stop_with_error",
    "report_success",
    "stop_with_question",
]
prompt = "merger.md"
tool = "helper"

[workflow.pipelines.main]
stages.planning = { role = "planner", prompts = ["task.md"], on_intermediate = { pause = true } }
stages.working = { role = "worker", prompts = ["task.md"], on_failure = { next = "working", pause = true }, on_intermediate = { next = "reviewing" } }
stages.reviewing = { role = "reviewer", prompts = ["task.md"], on_failure = { next = "working" }, on_intermediate = { next = "test_planner" } }
stages.test_planner = { role = "test_planner", prompts = ["task.md"], on_failure = { next = "working" }, on_intermediate = { next = "test_worker" } }
stages.test_worker = { role = "test_worker", prompts = ["task.md"], on_failure = { next = "test_worker", pause = true }, on_intermediate = { next = "working" } }
stages.linting = { role = "linter", prompts = ["task.md"], on_success = { next = "testing" }, on_failure = { next = "linter_worker" } }
stages.linter_worker = { role = "linter_worker", prompts = ["task.md"], on_success = { next = "linting" }, on_failure = { next = "working" } }
stages.testing = { role = "tester", prompts = ["task.md"], on_failure = { next = "working" } }

[workflow.pipelines.merge]
stages.merging = { role = "merger", prompts = ["task.md"] }
