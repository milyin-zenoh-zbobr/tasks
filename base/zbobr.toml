# zbobr configuration
# See documentation for all available options.

[dispatcher]
instance = "default"
workspaces = "./workspaces"
base_port = 3000
provider_exclusion_secs = 3600
provider_exclusion_fail_count = 3
work_branch_prefix = "zbobr_fix"
git_user_name = "zbobr"
git_user_email = "zbobr@example.com"
overwrite_author = false

[dispatcher.agent_github_token]
value = "not-configured"

[dispatcher.providers]
claude = { executor = "claude" }
copilot = { executor = "copilot" }
claude_planner = { parent = "claude", plan_mode = true }
copilot_planner = { parent = "copilot", plan_mode = true }

[dispatcher.tools]
developer = [{ provider = "claude", model = "claude-opus-4-6" }, { provider = "copilot", model = "claude-sonnet-4.6", priority = 0 }]
planner = [{ provider = "claude_planner", model = "claude-opus-4-6" }, { provider = "copilot_planner", model = "claude-sonnet-4.6", priority = 0 }]
helper = [{ provider = "copilot", model = "claude-haiku-4.5" }, { provider = "claude", model = "claude-haiku-4-5", priority = 0 }]
reviewer = [{ provider = "copilot", model = "gpt-5.4" }, { provider = "claude", model = "claude-sonnet-4-6", priority = 0 }]
drudge = [{ provider = "copilot", model = "gpt-5-mini" }, { provider = "claude", model = "claude-haiku-4-5", priority = 0 }]

[tasks]
default_max_stage_count = 20
github_repo = "owner/repo"
github_token.value = ""

[repo]
repository = "owner/repo"
branch = "main"
repos_dir = "./repos"
github_token.value = ""

[executor.copilot]

[workflow]
on_start = "plan"
on_merge = "merge"

[workflow.prompts]
main = nan
task = "prompts/task.md"

[workflow.roles.planner]
mcp = [
    "stop_with_error",
    "stop_with_question",
    "report_intermediate",
    "report_success",
    "get_ctx_rec",
]
tool = "planner"
prompts = { main = "prompts/planner.md" }

[workflow.roles.plan_reviewer]
mcp = [
    "stop_with_error",
    "stop_with_question",
    "report_success",
    "report_failure",
    "get_ctx_rec",
]
tool = "reviewer"
prompts = { main = "prompts/plan_reviewer.md" }

[workflow.roles.worker]
mcp = [
    "stop_with_error",
    "report_success",
    "report_failure",
    "report_intermediate",
    "stop_with_question",
    "add_checklist_item",
    "check_checklist_item",
    "get_ctx_rec",
]
tool = "developer"
prompts = { main = "prompts/worker.md" }

[workflow.roles.reviewer]
mcp = [
    "stop_with_error",
    "report_success",
    "report_failure",
    "report_intermediate",
    "stop_with_question",
    "check_checklist_item",
    "get_ctx_rec",
]
tool = "reviewer"
prompts = { main = "prompts/reviewer.md" }

[workflow.roles.tester]
mcp = [
    "stop_with_error",
    "report_success",
    "report_failure",
    "stop_with_question",
    "get_ctx_rec",
]
tool = "helper"
prompts = { main = "prompts/tester.md" }

[workflow.roles.linter]
mcp = [
    "stop_with_error",
    "report_success",
    "report_failure",
    "stop_with_question",
    "get_ctx_rec",
]
tool = "drudge"
prompts = { main = "prompts/linter.md" }

[workflow.roles.linter_worker]
mcp = [
    "stop_with_error",
    "report_success",
    "report_failure",
    "stop_with_question",
    "get_ctx_rec",
]
tool = "helper"
prompts = { main = "prompts/linter_worker.md" }

[workflow.roles.merger]
mcp = [
    "stop_with_error",
    "report_success",
    "stop_with_question",
]
tool = "helper"
prompts = { main = "prompts/merger.md" }

[workflow.pipelines.plan]
stages.planning = { role = "planner", on_success = { next = "plan_review_adversarial" }, on_intermediate = { next = "plan_review_adversarial" } }
stages.plan_review_adversarial = { role = "plan_reviewer", on_failure = { next = "planning" }, on_intermediate = { next = "plan_review_user" } }
stages.plan_review_user = { pause = true, on_failure = { next = "planning" } }
stages.call_work = { call = "work" }

[workflow.pipelines.work]
stages.working = { role = "worker", on_success = { next = "reviewing" }, on_failure = { next = "pause_retry_working" }, on_intermediate = { next = "working" } }
stages.pause_retry_working = { pause = true, on_success = { next = "working" }, on_failure = { next = "reviewing" }, on_no_report = { next = "working" } }
stages.reviewing = { role = "reviewer", on_failure = { next = "working" }, on_intermediate = { next = "working" } }
stages.linting = { role = "linter", on_success = { next = "testing" }, on_failure = { next = "linter_worker" } }
stages.linter_worker = { role = "linter_worker", on_success = { next = "linting" }, on_failure = { next = "working" } }
stages.testing = { role = "tester", on_failure = { next = "working" } }

[workflow.pipelines.merge]
stages.merging = { role = "merger", prompts = { task = nan } }
